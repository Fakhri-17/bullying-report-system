<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Data Generator - Laporan Bullying</title>
    <style>
        body {
            font-family: system-ui, sans-serif;
            max-width: 600px;
            margin: 2rem auto;
            padding: 2rem;
            background: #f8fafc;
        }
        button {
            background: #6366f1;
            color: white;
            border: none;
            padding: 1rem 2rem;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            margin: 1rem 0;
        }
        button:hover { background: #4f46e5; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }
        pre { background: white; padding: 1rem; border-radius: 8px; font-size: 0.9rem; overflow-x: auto; }
        .status { padding: 1rem; border-radius: 8px; margin: 1rem 0; }
        .success { background: #dcfce7; color: #166534; }
        .error { background: #fef2f2; color: #dc2626; }
    </style>
</head>
<body>
    <h1>🧪 Test Data Generator</h1>
    <p>Generate 5 test laporan bullying ke JSONBin untuk test statistik.</p>
    
    <button onclick="generateTestData()">🚀 Generate 5 Test Reports</button>
    <button onclick="fetchReports()">📊 Refresh Stats</button>
    
    <div id="status"></div>
    <pre id="response"></pre>

    <script>
        const BIN_ID = '69a7b4a643b1c97be9b1686d';
        const API_KEY = '$2a$10$ZgOdDp55A4Mo3GyQDF.a.OGEfqVKNERWKmU.JpGojEyTE1rlJC3mq';

        async function generateTestData() {
            const btn = event.target;
            btn.disabled = true;
            btn.textContent = 'Generating...';
            
            const testData = [
                {
                    id: Date.now(),
                    kasus: 'Test kasus 1 - Bullying verbal',
                    tempat: 'Kelas VII A',
                    jam: '14:30',
                    namaPembullying: 'Pelaku Test 1',
                    namaKorban: 'Korban Test 1',
                    walikelas: 'Bu Guru Test',
                    kelas: 'VII A',
                    status: 'baru',
                    tanggal: new Date().toLocaleDateString('id-ID', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'}),
                    waktu: new Date().toLocaleTimeString('id-ID')
                }
            ];

            // Generate 4 more with slight variations
            for (let i = 2; i <= 5; i++) {
                testData.push({
                    id: Date.now() + i,
                    kasus: `Test kasus ${i} - Bullying fisik`,
                    tempat: `Lapangan ${i}`,
                    jam: `12:${30 + i*5}`,
                    namaPembullying: `Pelaku Test ${i}`,
                    namaKorban: `Korban Test ${i}`,
                    walikelas: 'Bu Guru Test',
                    kelas: `VII ${['A','B','C','D'][i%4]}`,
                    status: i === 3 ? 'selesai' : 'baru', // 1 selesai
                    tanggal: new Date().toLocaleDateString('id-ID', {weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'}),
                    waktu: new Date().toLocaleTimeString('id-ID')
                });
            }

            try {
                // Get existing data
                const getRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                
                let data = [];
                if (getRes.ok) {
                    const result = await getRes.json();
                    data = Array.isArray(result.record) ? result.record : [];
                }

                // Add test data to front
                data.unshift(...testData);

                // Save
                const putRes = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`, {
                    method: 'PUT',
                    headers: { 
                        'Content-Type': 'application/json',
                        'X-Master-Key': API_KEY 
                    },
                    body: JSON.stringify(data)
                });

                if (putRes.ok) {
                    document.getElementById('status').innerHTML = '<div class="status success">✅ Success! 5 test reports added. Refresh laporan-bullying.html</div>';
                    document.getElementById('response').textContent = JSON.stringify(testData, null, 2);
                } else {
                    throw new Error('PUT failed');
                }
            } catch (error) {
                document.getElementById('status').innerHTML = `<div class="status error">❌ Error: ${error.message}</div>`;
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.textContent = '🚀 Generate 5 Test Reports';
            }
        }

        async function fetchReports() {
            try {
                const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`, {
                    headers: { 'X-Master-Key': API_KEY }
                });
                const data = await res.json();
                document.getElementById('response').textContent = JSON.stringify(data.record || [], null, 2);
            } catch (error) {
                document.getElementById('response').textContent = 'Error: ' + error.message;
            }
        }
    </script>
</body>
</html>
