<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laporan Bullying Sekolah</title>
    <meta name="description" content="Sistem pelaporan bullying sekolah yang aman dan rahasia">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            text-align: center;
        }

        .hero {
            max-width: 600px;
        }

        .logo {
            width: 120px;
            height: 120px;
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border-radius: 24px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: white;
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #1e293b, #334155);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        h1 span {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        p {
            font-size: 1.25rem;
            color: #64748b;
            margin-bottom: 3rem;
            line-height: 1.6;
        }

        .btn-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
            max-width: 600px;
            width: 100%;
        }

        .btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1rem;
            padding: 2.5rem 2rem;
            border-radius: 20px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .btn-public {
            background: linear-gradient(135deg, #10b981, #059669);
            color: white;
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .btn-public:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(16, 185, 129, 0.4);
            border-color: rgba(16, 185, 129, 0.3);
        }

        .btn-admin {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.3);
        }

        .btn-admin:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(99, 102, 241, 0.4);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .btn-icon {
            width: 64px;
            height: 64px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
        }

        .btn-text {
            font-size: 1.125rem;
        }

        .btn-desc {
            font-size: 0.875rem;
            color: rgba(255,255,255,0.8);
            font-weight: 400;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2rem;
            }

            p {
                font-size: 1.125rem;
            }

            .btn-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="hero">
        <div class="logo">🛡️</div>
        <h1>Sistem Laporan <span>Bullying</span></h1>
        <p>Laporkan kasus bullying dengan aman dan rahasia. Tim kami siap membantu menyelesaikan setiap kasus.</p>

        <div class="btn-grid">
            <a href="laporan-bullying.html" class="btn btn-public">
                <div class="btn-icon">📝</div>
                <div>
                    <div class="btn-text">Laporkan Bullying</div>
                    <div class="btn-desc">Formulir pelaporan siswa</div>
                </div>
            </a>

            <a href="login-admin.html" class="btn btn-admin">
                <div class="btn-icon">🔐</div>
                <div>
                    <div class="btn-text">Admin Dashboard</div>
                    <div class="btn-desc">Kelola laporan (Admin/BK)</div>
                </div>
            </a>
        </div>
    </div>
</body>
</html>
