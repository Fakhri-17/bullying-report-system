<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Admin - Laporan Bullying</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366F1;
            --primary-dark: #4F46E5;
            --secondary: #1E293B;
            --accent: #F59E0B;
            --background: #F8FAFC;
            --text: #334155;
            --text-light: #64748B;
            --white: #FFFFFF;
            --error: #EF4444;
            --success: #10B981;
            --shadow: 0 10px 40px rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: linear-gradient(135deg, var(--background) 0%, #E2E8F0 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .login-container {
            background: var(--white);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 3rem;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-logo {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 20px;
            margin: 0 auto 2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            color: var(--white);
        }

        .login-title {
            font-size: 1.75rem;
            font-weight: 700;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        .login-subtitle {
            color: var(--text-light);
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-weight: 500;
            color: var(--secondary);
            margin-bottom: 0.5rem;
            font-size: 0.875rem;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #E2E8F0;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .error {
            border-color: var(--error);
        }

        .error-text {
            color: var(--error);
            font-size: 0.8125rem;
            margin-top: 0.5rem;
            display: none;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: var(--white);
            border: none;
            padding: 1rem;
            border-radius: 12px;
            font-family: 'Outfit', sans-serif;
            font-size: 1.0625rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
        }

        .btn-login:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid #E2E8F0;
            color: var(--text-light);
            font-size: 0.875rem;
        }

        .demo-link {
            color: var(--primary);
            text-decoration: none;
            font-weight: 500;
        }

        .demo-link:hover {
            text-decoration: underline;
        }

        @media (max-width: 480px) {
            .login-container {
                padding: 2rem 1.5rem;
                margin: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-logo">🔐</div>
        <h1 class="login-title">Admin Login</h1>
        <p class="login-subtitle">Masuk untuk mengelola laporan bullying</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="username">ID Admin</label>
                <input type="text" id="username" required>
                <span class="error-text">ID tidak valid</span>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" required>
                <span class="error-text">Password salah</span>
            </div>

            <button type="submit" class="btn-login">Masuk ke Dashboard</button>
        </form>

        <div class="login-footer">
            <a href="laporan-bullying.html" class="demo-link">📝 Laporkan Bullying</a>
        </div>
    </div>

    <script>
        const form = document.getElementById('loginForm');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');

        form.addEventListener('submit', function(e) {
            e.preventDefault();

            const username = usernameInput.value.trim();
            const password = passwordInput.value.trim();

            // Clear previous errors
            document.querySelectorAll('.error').forEach(el => el.classList.remove('error'));
            document.querySelectorAll('.error-text').forEach(el => el.style.display = 'none');

            let valid = true;

            if (username !== 'Admin') {
                usernameInput.parentElement.classList.add('error');
                usernameInput.nextElementSibling.style.display = 'block';
                valid = false;
            }

            if (password !== 'BK@spenam') {
                passwordInput.parentElement.classList.add('error');
                passwordInput.nextElementSibling.style.display = 'block';
                valid = false;
            }

            if (valid) {
                // Redirect to admin dashboard
                window.location.href = 'admin-laporan.html';
            }
        });

        // Focus first input
        usernameInput.focus();
    </script>
</body>
</html>
